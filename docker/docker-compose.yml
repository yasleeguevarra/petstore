version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: petstore-postgres
    environment:
      POSTGRES_DB: petstore
      POSTGRES_USER: petstore
      POSTGRES_PASSWORD: petstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petstore-network

volumes:
  postgres_data:

networks:
  petstore-network:
    driver: bridge