services:
  - type: web
    name: petstore-backend
    runtime: docker
    dockerfilePath: ./docker/backend.Dockerfile
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: petstore-db
          property: connectionString
    healthCheckPath: /api/guevarra/pets
    disk:
      name: petstore-data
      mountPath: /app/data
      sizeGB: 1

  - type: web
    name: petstore-frontend
    runtime: docker
    dockerfilePath: ./docker/frontend.Dockerfile
    envVars:
      - key: REACT_APP_API_URL
        value: https://petstore-backend.onrender.com/api/guevarra
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: petstore-db
    databaseName: petstore
    user: petstore
    plan: starter